name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Setup Google credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcloud-key.json

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --project serviciossociales-f15f6 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json
