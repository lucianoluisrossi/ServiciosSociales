name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project serviciossociales-f15f6 --non-interactive
        working-directory: functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
